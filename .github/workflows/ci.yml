name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests
      - name: ruff format --check
        run: ruff format --check src tests

  security:
    name: Security Scan (bandit & pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip bandit pip-audit && pip install -e ".[dev]"
      - name: Run Bandit
        run: bandit -r src
      - name: Run Pip Audit
        run: pip-audit

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory until the detector plugins land
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: mypy src

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests \
            --cov=src/redactai \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          load: true
          tags: redactai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test the image
        run: |
          docker run -d --name rg -p 8000:8000 redactai:ci
          for i in $(seq 1 20); do
            if curl -fs http://127.0.0.1:8000/health > /dev/null; then
              echo "health OK"; break
            fi
            sleep 1
          done
          curl -fs http://127.0.0.1:8000/health
          docker rm -f rg
